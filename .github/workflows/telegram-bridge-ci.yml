name: telegram-bridge-ci

on:
  push:
    paths:
      - "src/telegram_bridge/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/telegram-bridge-ci.yml"
  pull_request:
    paths:
      - "src/telegram_bridge/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/telegram-bridge-ci.yml"

jobs:
  bridge-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install QA tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ruff coverage

      - name: Lint (lightweight)
        run: |
          ruff check src/telegram_bridge tests/telegram_bridge
          python3 -m py_compile src/telegram_bridge/main.py
          python3 -m py_compile src/telegram_bridge/executor.py
          python3 -m py_compile src/telegram_bridge/handlers.py
          python3 -m py_compile src/telegram_bridge/media.py
          python3 -m py_compile src/telegram_bridge/session_manager.py
          python3 -m py_compile src/telegram_bridge/state_store.py
          python3 -m py_compile src/telegram_bridge/structured_logging.py
          python3 -m py_compile src/telegram_bridge/stream_buffer.py
          python3 -m py_compile src/telegram_bridge/transport.py

      - name: Unit tests
        run: |
          coverage run -m unittest discover -s tests -p 'test_*.py'
          coverage report -m

      - name: Self-test and smoke test
        run: |
          python3 src/telegram_bridge/main.py --self-test
          bash src/telegram_bridge/smoke_test.sh
