name: telegram-bridge-ci

on:
  push:
    paths:
      - "src/telegram_bridge/**"
      - "src/architect_cli/**"
      - "ops/server3_runtime_status.py"
      - "ops/runtime_overlays/**"
      - "ops/dev/**"
      - "requirements-dev.txt"
      - "tests/telegram_bridge/**"
      - "tests/test_server3_runtime_status.py"
      - "tests/test_sync_server3_runtime_overlays.py"
      - "pyproject.toml"
      - ".github/workflows/telegram-bridge-ci.yml"
  pull_request:
    paths:
      - "src/telegram_bridge/**"
      - "src/architect_cli/**"
      - "ops/server3_runtime_status.py"
      - "ops/runtime_overlays/**"
      - "ops/dev/**"
      - "requirements-dev.txt"
      - "tests/telegram_bridge/**"
      - "tests/test_server3_runtime_status.py"
      - "tests/test_sync_server3_runtime_overlays.py"
      - "pyproject.toml"
      - ".github/workflows/telegram-bridge-ci.yml"

jobs:
  bridge-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Shared Python QA
        run: bash ops/dev/run_python_checks.sh
